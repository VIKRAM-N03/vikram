<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vikram N | Cybersecurity</title>

<link rel="stylesheet" href="style.css">

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.4/gsap.min.js"></script>

<!-- PARTICLES -->
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<script>
window.GH_IMAGES = {
  user: 'VIKRAM-N03',
  repo: 'portfolio', // ⚠️ CHANGE IF DIFFERENT

  base() {
    return `https://raw.githubusercontent.com/${this.user}/${this.repo}/${this.branch}/images/`;

<body>

<!-- ABOUT -->
<section class="about">

  <img id="aboutPhoto" src="images/profile.jpg" class="profile">

<!-- PROJECTS -->
<section class="projects">

  <div class="project-card">
